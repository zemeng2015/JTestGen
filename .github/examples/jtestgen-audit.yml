name: JTestGen Coverage Audit

on:
  workflow_dispatch:
    inputs:
      target_class:
        description: "Optional fully qualified class name"
        required: false
        type: string

jobs:
  scan:
    name: Scan coverage targets
    runs-on: ubuntu-latest
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install JTestGen
        run: |
          python -m pip install git+https://github.com/zemeng2015/JTestGen.git

      - name: Doctor
        run: |
          java-testgen doctor .

      - name: Scan low-coverage targets
        run: |
          java-testgen scan . --top 10

  generate:
    name: Generate test candidate
    runs-on: ubuntu-latest
    needs: scan
    if: ${{ github.event.inputs.target_class != '' }}
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install JTestGen
        run: |
          python -m pip install git+https://github.com/zemeng2015/JTestGen.git

      - name: Generate and validate test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          java-testgen run . --target-class "${{ github.event.inputs.target_class }}"

      - name: Upload JTestGen artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jtestgen-run-artifacts
          path: .jtestgen/runs/**
